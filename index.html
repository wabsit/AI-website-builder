<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Website Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🚀 AI Website Builder</h1>
  <p>Create Modern Websites with AI Prompts</p>
</header>

<main class="container">
  <textarea id="prompt" placeholder="Describe your website...
Example: Create a modern portfolio website"></textarea>

  <button id="generateBtn">
    Generate Website
  </button>

  <div class="preview">
    <h2>Preview</h2>
    <iframe id="previewFrame"></iframe>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
